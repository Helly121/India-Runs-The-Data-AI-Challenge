# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"

ai_usage_summary: |
  Used Gemini to collaboratively design the two-stage ranking architecture, 
  implement the SentenceTransformer embedding logic, and write Python code for 
  the CPU memory optimization pipeline. The team directed the overall strategy 
  and logic. No candidate data was fed to any LLM; all processing happened locally.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  We built a two-stage candidate ranking system strictly optimized for CPU. 
  
  Stage 1 is a fast heuristic filter utilizing exact skill matching, career 
  string scanning, title alignment, and behavioral multipliers. This pares 
  the 100,000 candidates down to 4,000. 
  
  Stage 2 embeds candidate text (title, skills, summary, career) using 
  SentenceTransformer ('all-MiniLM-L6-v2') to compute cosine similarity 
  against the JD embeddings. 
  
  We also built a Zero-Trust Honeypot engine that disqualifies profiles 
  with impossible timelines or impossible engagement metrics. 
  
  Performance is heavily optimized by bypassing disk I/O via caching candidates 
  fully in RAM, and performing pre-tokenizer text truncation to save CPU cycles. 
  This allows the pipeline to safely finish in under 5 minutes.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
